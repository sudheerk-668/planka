name: Security Scanner Test

on:
  workflow_dispatch:

jobs:
  scan-and-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1. Generate SBOM
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          output-file: sbom.spdx.json
          path: . 

      # 2. Scan SBOM
      - name: Scan for Vulnerabilities
        id: scan
        uses: anchore/scan-action@v3
        with:
          sbom: sbom.spdx.json
          severity-cutoff: high
          fail-build: false
          output-format: json

      # 3. Process Results (With Executive Summary)
      - name: Process Results
        id: process
        run: |
          REPO_NAME="${{ github.repository }}"
          REPO_LINK="${{ github.server_url }}/${{ github.repository }}"
          
          if [ ! -f results.json ]; then
            echo "No vulnerabilities found."
            echo "has_issues=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # --- Calculate Statistics ---
          
          # 1. Count total packages from SBOM
          TOTAL_PACKAGES=$(jq '.packages | length' sbom.spdx.json)
          
          # 2. Count vulnerabilities by severity
          TOTAL_CRITICAL=$(jq '[.matches[] | select(.vulnerability.severity == "Critical")] | length' results.json)
          TOTAL_HIGH=$(jq '[.matches[] | select(.vulnerability.severity == "High")] | length' results.json)
          TOTAL_MEDIUM=$(jq '[.matches[] | select(.vulnerability.severity == "Medium")] | length' results.json)
          
          # 3. Determine Risk Level
          if [ "$TOTAL_CRITICAL" -gt 0 ]; then
            RISK_LEVEL="🔴 CRITICAL"
            RISK_ADVICE="Immediate action required. Critical vulnerabilities found."
          elif [ "$TOTAL_HIGH" -gt 0 ]; then
            RISK_LEVEL="🟠 HIGH"
            RISK_ADVICE="Action required. High severity vulnerabilities found."
          elif [ "$TOTAL_MEDIUM" -gt 0 ]; then
            RISK_LEVEL="🟡 MEDIUM"
            RISK_ADVICE="Review recommended. Medium severity vulnerabilities found."
          else
            RISK_LEVEL="🟢 LOW"
            RISK_ADVICE="No high or critical vulnerabilities found."
          fi

          # 4. Filter for the detailed report (Only High/Critical)
          jq '[.matches[] | select(.vulnerability.severity == "Critical" or .vulnerability.severity == "High")]' results.json > filtered_results.json
          COUNT=$(jq 'length' filtered_results.json)
          
          if [ "$COUNT" -gt 0 ]; then
            echo "has_issues=true" >> $GITHUB_OUTPUT
            echo "count=$COUNT" >> $GITHUB_OUTPUT
            
            # --- Build The Report ---
            
            # A. Executive Summary Section
            {
              echo "📊 **Executive Security Summary**";
              echo "================================";
              echo "**Repository**: [$REPO_NAME]($REPO_LINK)";
              echo "**Packages Scanned**: $TOTAL_PACKAGES";
              echo "**Overall Risk**: $RISK_LEVEL";
              echo "";
              echo "**Vulnerability Breakdown**:";
              echo "• Critical: $TOTAL_CRITICAL";
              echo "• High: $TOTAL_HIGH";
              echo "• Medium: $TOTAL_MEDIUM";
              echo "";
              echo "**Recommendation**: $RISK_ADVICE";
              echo "";
              echo "================================";
              echo "";
            } > report.txt

            # B. Detailed Findings Section
            echo "🔍 **Detailed High/Critical Findings**" >> report.txt
            echo "" >> report.txt
            
            jq -r '.[] | 
              "Package: \(.artifact.name) (\(.artifact.version))\n
              Vulnerability: \(.vulnerability.id)\n
              Severity: \(.vulnerability.severity)\n
              CVSS Score: \((.vulnerability.cvss // []) | map(.baseScore) | max // "N/A")\n
              Link (OSV): https://osv.dev/vulnerability/\(.vulnerability.id)\n
              Action: \(if .vulnerability.fix.versions then "Upgrade to " + (.vulnerability.fix.versions | join(", ")) else "No fix available" end)\n
              ---"' filtered_results.json >> report.txt

            # --- Prepare Slack Payload ---
            jq -n \
              --arg text "Security Alert: $COUNT High/Critical vulnerabilities in $REPO_NAME" \
              --arg report "$(cat report.txt)" \
              '{
                "text": $text,
                "blocks": [
                  {
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": $report
                    }
                  }
                ]
              }' > slack-payload.json

            # Print to logs
            echo "--- REPORT PREVIEW ---"
            cat report.txt
            echo "--- END PREVIEW ---"
          else
            echo "has_issues=false" >> $GITHUB_OUTPUT
            echo "No High or Critical vulnerabilities found."
          fi

      # 4. Send to Slack
      - name: Notify Slack
        if: steps.process.outputs.has_issues == 'true'
        uses: slackapi/slack-github-action@v1
        with:
          payload-file-path: slack-payload.json
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
