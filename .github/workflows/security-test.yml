name: Security Scanner Test

on:
  workflow_dispatch:

jobs:
  scan-and-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1. Generate SBOM (Fixed input: path)
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          output-file: sbom.spdx.json
          path: . 

      # 2. Scan SBOM (Fixed input: sbom)
      - name: Scan for Vulnerabilities
        id: scan
        uses: anchore/scan-action@v3
        with:
          sbom: sbom.spdx.json
          severity-cutoff: high
          fail-build: false
          output-format: json

      # 3. Process Results (Repo Link, CVE Link, CVSS, Fix Version)
      - name: Process Results
        id: process
        run: |
          # Setup Vars
          REPO_NAME="${{ github.repository }}"
          REPO_LINK="${{ github.server_url }}/${{ github.repository }}"
          
          # Check if results exist
          if [ ! -f results.json ]; then
            echo "No vulnerabilities found."
            echo "has_issues=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Filter for High and Critical ONLY
          jq '[.matches[] | select(.vulnerability.severity == "Critical" or .vulnerability.severity == "High")]' results.json > filtered_results.json
          
          COUNT=$(jq 'length' filtered_results.json)
          
          if [ "$COUNT" -gt 0 ]; then
            echo "has_issues=true" >> $GITHUB_OUTPUT
            echo "count=$COUNT" >> $GITHUB_OUTPUT
            
            # --- Create Human Readable Text Report for Logs/Email ---
            echo "🚨 **Security Vulnerability Report** 🚨" > report.txt
            echo "Repository: [$REPO_NAME]($REPO_LINK)" >> report.txt
            echo "Total High/Critical Issues: $COUNT" >> report.txt
            echo "----------------------------------------" >> report.txt
            
            # Append detailed vulnerability info
            jq -r '.[] | 
              "Package: \(.artifact.name) (\(.artifact.version))\n
              Vulnerability: \(.vulnerability.id)\n
              Severity: \(.vulnerability.severity)\n
              CVSS Score: \((.vulnerability.cvss // []) | map(.baseScore) | max // "N/A")\n
              Link (OSV): https://osv.dev/vulnerability/\(.vulnerability.id)\n
              Action: \(if .vulnerability.fix.versions then "Upgrade to " + (.vulnerability.fix.versions | join(", ")) else "No fix available" end)\n
              ---"' filtered_results.json >> report.txt

            # --- Create JSON Payload for Slack (Safe Method) ---
            # We construct the block kit JSON structure using jq to handle escaping automatically
            jq -n \
              --arg text "Security Alert: $COUNT High/Critical vulnerabilities in $REPO_NAME" \
              --arg repo_link "$REPO_LINK" \
              --arg repo_name "$REPO_NAME" \
              --arg count "$COUNT" \
              --arg report "$(cat report.txt)" \
              '{
                "text": $text,
                "blocks": [
                  {
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": $report
                    }
                  }
                ]
              }' > slack-payload.json

            # Print to logs
            echo "--- REPORT PREVIEW ---"
            cat report.txt
            echo "--- END PREVIEW ---"
          else
            echo "has_issues=false" >> $GITHUB_OUTPUT
            echo "No High or Critical vulnerabilities found."
          fi

      # 4. Send to Slack (Using file payload to avoid escaping issues)
      - name: Notify Slack
        if: steps.process.outputs.has_issues == 'true'
        uses: slackapi/slack-github-action@v1
        with:
          payload-file-path: slack-payload.json
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
