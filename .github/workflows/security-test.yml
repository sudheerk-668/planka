name: Security Scanner Test

on:
  workflow_dispatch: # Allows you to trigger this manually from the Actions tab

jobs:
  scan-and-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1. Generate SBOM
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          output-file: sbom.spdx.json
          artifact: .

      # 2. Scan SBOM for Vulnerabilities
      - name: Scan for Vulnerabilities
        id: scan
        uses: anchore/scan-action@v3
        with:
          file: sbom.spdx.json
          severity-cutoff: high
          fail-build: false # We handle the logic, so we don't want the job to fail immediately
          output-format: json

      # 3. Process and Filter Results
      - name: Process Results
        id: process
        run: |
          # Check if results exist
          if [ ! -f results.json ]; then
            echo "No vulnerabilities found."
            echo "has_issues=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Filter for High and Critical ONLY (CVSS >= 7)
          jq '[.matches[] | select(.vulnerability.severity == "Critical" or .vulnerability.severity == "High")]' results.json > filtered_results.json
          
          COUNT=$(jq 'length' filtered_results.json)
          
          if [ "$COUNT" -gt 0 ]; then
            echo "has_issues=true" >> $GITHUB_OUTPUT
            echo "count=$COUNT" >> $GITHUB_OUTPUT
            
            # Create Text Report
            echo "🚨 **Security Vulnerability Report** 🚨" > report.txt
            echo "Repository: $GITHUB_REPOSITORY" >> report.txt
            echo "Total High/Critical Issues: $COUNT" >> report.txt
            echo "----------------------------------------" >> report.txt
            
            # Append details to report
            jq -r '.[] | "Package: \(.artifact.name)\nVulnerability: \(.vulnerability.id)\nSeverity: \(.vulnerability.severity)\n---"' filtered_results.json >> report.txt
            
            # Prepare content for Slack (Handling newlines)
            REPORT_CONTENT=$(cat report.txt)
            echo "REPORT_CONTENT<<EOF" >> $GITHUB_ENV
            echo "$REPORT_CONTENT" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
            
            # Print to logs for debugging
            echo "--- REPORT START ---"
            cat report.txt
            echo "--- REPORT END ---"
          else
            echo "has_issues=false" >> $GITHUB_OUTPUT
            echo "No High or Critical vulnerabilities found."
          fi

      # 4. Send to Slack
      - name: Notify Slack
        if: steps.process.outputs.has_issues == 'true'
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Security Alert: ${{ steps.process.outputs.count }} High/Critical vulnerabilities found in ${{ github.repository }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ${{ toJson(env.REPORT_CONTENT) }}
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
