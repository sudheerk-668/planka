name: Security Scanner Test

on:
  workflow_dispatch: # Allows you to trigger this manually from the Actions tab

jobs:
  scan-and-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1. Generate SBOM
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          output-file: sbom.spdx.json
          artifact: .

      # 2. Scan SBOM for Vulnerabilities
      - name: Scan for Vulnerabilities
        id: scan
        uses: anchore/scan-action@v3
        with:
          file: sbom.spdx.json
          severity-cutoff: high
          fail-build: false # We handle the logic
          output-format: json

      # 3. Process and Filter Results (ENHANCED)
      - name: Process Results
        id: process
        run: |
          # Define Repo Link
          REPO_NAME="${{ github.repository }}"
          REPO_LINK="${{ github.server_url }}/${{ github.repository }}"
          
          # Check if results exist
          if [ ! -f results.json ]; then
            echo "No vulnerabilities found."
            echo "has_issues=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Filter for High and Critical ONLY
          jq '[.matches[] | select(.vulnerability.severity == "Critical" or .vulnerability.severity == "High")]' results.json > filtered_results.json
          
          COUNT=$(jq 'length' filtered_results.json)
          
          if [ "$COUNT" -gt 0 ]; then
            echo "has_issues=true" >> $GITHUB_OUTPUT
            echo "count=$COUNT" >> $GITHUB_OUTPUT
            
            # --- Create Detailed Text Report ---
            echo "🚨 **Security Vulnerability Report** 🚨" > report.txt
            echo "Repository: [$REPO_NAME]($REPO_LINK)" >> report.txt
            echo "Total High/Critical Issues: $COUNT" >> report.txt
            echo "----------------------------------------" >> report.txt
            
            # Parse each vulnerability and append details
            jq -r '.[] | 
              "Package: \(.artifact.name) (\(.artifact.version))\n
              Vulnerability: \(.vulnerability.id)\n
              Severity: \(.vulnerability.severity)\n
              CVSS Score: \((.vulnerability.cvss // []) | map(.baseScore) | max // "N/A")\n
              Link (OSV): https://osv.dev/vulnerability/\(.vulnerability.id)\n
              Action: \(if .vulnerability.fix.versions then "Upgrade to " + (.vulnerability.fix.versions | join(", ")) else "No fix available" end)\n
              ---"' filtered_results.json >> report.txt

            # --- Prepare content for Slack ---
            # We create a clean environment variable for Slack
            REPORT_CONTENT=$(cat report.txt)
            
            echo "REPORT_CONTENT<<EOF" >> $GITHUB_ENV
            echo "$REPORT_CONTENT" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
            
            # Print to logs for debugging
            echo "--- REPORT PREVIEW ---"
            cat report.txt
            echo "--- END PREVIEW ---"
          else
            echo "has_issues=false" >> $GITHUB_OUTPUT
            echo "No High or Critical vulnerabilities found."
          fi

      # 4. Send to Slack
      - name: Notify Slack
        if: steps.process.outputs.has_issues == 'true'
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Security Alert: ${{ steps.process.outputs.count }} High/Critical vulnerabilities found in ${{ github.repository }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ${{ toJson(env.REPORT_CONTENT) }}
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
